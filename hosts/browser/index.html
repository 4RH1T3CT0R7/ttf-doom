<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TTDoom - DOOM in a TrueType Font</title>
<style>
    @font-face {
        font-family: 'DoomFont';
        src: url('../../doom.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        overflow: hidden;
        font-family: monospace;
    }

    #game {
        font-family: 'DoomFont', monospace;
        font-size: min(95vh, 95vw);
        color: #33ff33;
        line-height: 1;
        letter-spacing: 0;
        font-variation-settings:
            'MOVX' 0,
            'MOVY' 0,
            'TURN' 0,
            'FIRE' 0,
            'ACTN' 0;
        user-select: none;
        -webkit-user-select: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    /* Crosshair */
    #overlay {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 5;
    }

    #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 10;
    }
    #crosshair::before,
    #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(0, 200, 0, 0.6);
    }
    #crosshair::before {
        width: 20px;
        height: 2px;
        top: -1px;
        left: -10px;
    }
    #crosshair::after {
        width: 2px;
        height: 20px;
        top: -10px;
        left: -1px;
    }

    /* Minimap */
    #minimap {
        position: fixed;
        top: 10px;
        right: 10px;
        border: 1px solid #333;
        z-index: 10;
        image-rendering: pixelated;
    }

    #hud {
        color: #0a0;
        font-size: 13px;
        position: fixed;
        bottom: 12px;
        left: 12px;
        line-height: 1.5;
        z-index: 10;
    }

    #hud kbd {
        background: #222;
        border: 1px solid #444;
        border-radius: 3px;
        padding: 1px 5px;
        color: #0f0;
    }

    #status {
        color: #555;
        font-size: 11px;
        position: fixed;
        top: 8px;
        left: 12px;
        z-index: 10;
    }

    #title {
        color: #c00;
        font-size: 22px;
        font-weight: bold;
        position: fixed;
        bottom: 40px;
        left: 12px;
        letter-spacing: 4px;
        z-index: 10;
    }
</style>
</head>
<body>
    <div id="game">A</div>
    <canvas id="overlay"></canvas>
    <div id="crosshair"></div>
    <canvas id="minimap" width="150" height="150"></canvas>
    <div id="title">TTDOOM</div>
    <div id="hud">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;
        <kbd>&larr;</kbd><kbd>&rarr;</kbd> turn &nbsp;
        <kbd>Space</kbd> shoot &nbsp;
        <kbd>R</kbd> restart &nbsp;
        <kbd>D</kbd> debug
    </div>
    <div id="status">Loading font...</div>
    <script src="doom.js"></script>
</body>
</html>
