<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTDoom POC Font Test</title>
    <style>
        @font-face {
            font-family: "DoomPOC";
            src: url("../../poc.ttf") format("truetype");
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        h1 {
            color: #ff4444;
            border-bottom: 2px solid #ff4444;
            padding-bottom: 0.5rem;
        }

        .test-area {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 2rem;
            margin: 1.5rem 0;
        }

        .doom-font {
            font-family: "DoomPOC", monospace;
            color: #00ff00;
            line-height: 1.2;
        }

        .size-24  { font-size: 24px; }
        .size-48  { font-size: 48px; }
        .size-72  { font-size: 72px; }
        .size-120 { font-size: 120px; }

        .label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }

        .row {
            margin-bottom: 1.5rem;
        }

        canvas {
            border: 1px solid #444;
            background: #000;
            display: block;
            margin-top: 1rem;
        }

        #status {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .status-ok { background: #0a3d0a; color: #4caf50; }
        .status-err { background: #3d0a0a; color: #f44336; }
    </style>
</head>
<body>
    <h1>TTDoom -- POC Font Test</h1>

    <div id="status">Loading font...</div>

    <div class="test-area">
        <div class="row">
            <div class="label">24px</div>
            <div class="doom-font size-24">A</div>
        </div>
        <div class="row">
            <div class="label">48px</div>
            <div class="doom-font size-48">A</div>
        </div>
        <div class="row">
            <div class="label">72px</div>
            <div class="doom-font size-72">A</div>
        </div>
        <div class="row">
            <div class="label">120px</div>
            <div class="doom-font size-120">A</div>
        </div>
    </div>

    <h2>Canvas rendering</h2>
    <canvas id="canvas" width="400" height="200"></canvas>

    <script>
        // Check whether the @font-face loaded successfully.
        document.fonts.ready.then(function () {
            const loaded = document.fonts.check('48px "DoomPOC"');
            const status = document.getElementById("status");
            if (loaded) {
                status.textContent = "DoomPOC font loaded successfully.";
                status.className = "status-ok";
            } else {
                status.textContent = "WARNING: DoomPOC font did NOT load. Check the file path.";
                status.className = "status-err";
            }

            // Draw the glyph onto a canvas for pixel-level inspection.
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = '120px "DoomPOC"';
            ctx.fillStyle = "#00ff00";
            ctx.textBaseline = "alphabetic";
            ctx.fillText("A", 40, 170);

            // Draw grid lines for visual reference.
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.lineWidth = 0.5;
            for (let y = 0; y < canvas.height; y += 20) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        });
    </script>
</body>
</html>
